{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up · JobTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-logo"><span class="auth-logo-dot"></span> JobTracker</div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Start tracking your job search today</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="fg" style="margin-bottom:0.9rem">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="field-error">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
    </div>
</div>
</body>
</html>
